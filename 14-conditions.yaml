- name: gathering facts
  hosts: local
  connection: local
  become: true
  tasks:
  - name: print facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: check redhat or not
    ansible.builtin.debug:
      msg: "This is redhat os"
    when: ansible_facts['os_family'] == "RedHat"

  - name: check ubuntu or not
    ansible.builtin.debug:
      msg: "This is ubuntu os"
    when: ansible_facts['os_family'] == "Debian"