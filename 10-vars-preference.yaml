- name: variable preference
  hosts: web
  become: true
  vars: 
    NAME: "Ansible from play"
    vars_prompt:
    - name: NAME
      prompt: please enter name
      private: false
  tasks:
  - name: print name
    vars:
      NAME: "ansible from task"
    ansible.builtin.debug:
      msg: "Name is: {{ NAME }}"