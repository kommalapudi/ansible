- name: filters in ansible
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    tagsList:
      name: ansible
      project: roboshop
      component: catalogue
  become: true
  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hello klinkaara, {{ GREETING | default('Good Morning') }}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"

  - name: convert map to list
    ansible.builtin.debug:
      msg: "{{ tagsList | dict2items }}"